x-backend: &backend
  build: .
  env_file: .env.production.local
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

# These override the localhost values from .env.production.local so containers
# reach each other by service name on the compose network.
x-backend-env: &backend-env
  DB_HOST: postgres
  REDIS_HOST: redis
  HOSTNAME: 0.0.0.0

services:
  api:
    <<: *backend
    command: node app.js
    environment:
      <<: *backend-env
      DB_USER: bia_app
    ports:
      - "3000:3000"

  dispatcher:
    <<: *backend
    command: node dispatcher-server.js
    environment:
      <<: *backend-env
      DB_USER: bia_worker

  worker:
    <<: *backend
    command: node worker-server.js
    environment:
      <<: *backend-env
      DB_USER: bia_worker

  frontend:
    build: ./frontend
    environment:
      API_UPSTREAM: http://api:3000
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    env_file: .env.production.local
    environment:
      POSTGRES_USER: bia_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: bia_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bia_user -d bia_prod"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    env_file: .env.production.local
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    env_file: .env.production.local
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
