# test postgres + redis (ports 5433/6380 so dev stack doesn't clash)

services:
  postgres-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: bia_user
      POSTGRES_PASSWORD: bia_password
      POSTGRES_DB: bia_test
    ports:
      - "5433:5432"
    volumes:
      # init.sql on first start
      - ../db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bia_user -d bia_test"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis-test:
    image: redis:8-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
